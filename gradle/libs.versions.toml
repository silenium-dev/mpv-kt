[versions]
kotlin = "2.3.21"
nix-natives = "0.5.1"

slf4j = "2.0.18"
logback = "1.5.32"

kotlinx-coroutines = "1.11.0"
atomicfu = "0.32.1"

[libraries]
slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }

kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx-coroutines" }
kotlinx-atomicfu = { module = "org.jetbrains.kotlinx:atomicfu", version.ref = "atomicfu" }

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-atomicfu = { id = "org.jetbrains.kotlin.plugin.atomicfu", version.ref = "kotlin" }
nix-natives = { id = "dev.silenium.libs.jni.nix-natives", version.ref = "nix-natives" }
