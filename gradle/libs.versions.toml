[versions]
kotlin = "2.3.21"
nix-natives = "0.5.1"
agp = "9.2.1"

slf4j = "2.0.18"
logback = "1.5.32"

kotlinx-coroutines = "1.11.0"
atomicfu = "0.32.1"

lwjgl = "3.3.6"

jetbrains-annotations = "26.1.0"

[libraries]
slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j" }
logback-classic = { module = "ch.qos.logback:logback-classic", version.ref = "logback" }

kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx-coroutines" }
kotlinx-atomicfu = { module = "org.jetbrains.kotlinx:atomicfu", version.ref = "atomicfu" }

lwjgl-bom = { module = "org.lwjgl:lwjgl-bom", version.ref = "lwjgl" }
lwjgl-core = { module = "org.lwjgl:lwjgl" }
lwjgl-egl = { module = "org.lwjgl:lwjgl-egl" }
lwjgl-opengl = { module = "org.lwjgl:lwjgl-opengl" }

jetbrains-annotations = { module = "org.jetbrains:annotations", version.ref = "jetbrains-annotations" }

[plugins]
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-atomicfu = { id = "org.jetbrains.kotlin.plugin.atomicfu", version.ref = "kotlin" }
android-kotlin = { id = "com.android.kotlin.multiplatform.library", version.ref = "agp" }
nix-natives = { id = "dev.silenium.libs.jni.nix-natives", version.ref = "nix-natives" }

[bundles]
lwjgl = [
    "lwjgl-core",
    "lwjgl-opengl",
]
